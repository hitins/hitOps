[general]
import = []
live_config_reload = true

[terminal]
shell = { program = "/usr/bin/bash" } ## not always usable

[window]
startup_mode = "Windowed"
decorations_theme_variant = "None"
decorations = "None"
dynamic_title = true
opacity = 0.6
blur = true
padding = { x=3, y=3 }
dimensions = { columns = 120, lines = 60 }
position = "None"

[scrolling]
history = 10000
multiplier = 3

[font]
size = 13
normal = { family = "SauceCodePro Nerd Font Mono", style = "Regular" }
italic = { family = "SauceCodePro Nerd Font Mono", style = "Italic" }
bold = { family = "SauceCodePro Nerd Font Mono", style = "Bold" }
bold_italic = { family = "SauceCodePro Nerd Font Mono", style = "Bold Italic" }

[colors.primary]
foreground = "0xeeeeec"

[colors.normal]
black = '0x2e3436'
red = '0xcc0000'
green = '0x73d216'
yellow = '0xedd400'
blue = '0x3465a4'
magenta = '0x75507b'
cyan = '0x06989a'
white = '0xd3d7cf'

[colors.bright]
black = '0x2e3436'
red = '0xef2929'
green = '0x8ae234'
yellow = '0xfce94f'
blue = '0x729fcf'
magenta = '0xad7fa8'
cyan = '0x34e2e2'
white = '0xeeeeec'

[bell]
animation = "Linear"
duration = 0

[selection]
save_to_clipboard = false

[mouse]
hide_when_typing = false

[keyboard]
bindings = [
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" }
]

