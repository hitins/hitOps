$font = SauceCodePro Nerd Font

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    color = rgba(16, 16, 16, 1.0)
    blur_passes = 3
}

image {
    monitor =
    path = ~/.config/hypr/1wp.jpeg
    size = 100
    rounding = 0 # no rounding
    position = 0, 200
    halign = center
    valign = center
}

shape {
    monitor =
    size = 360, 60
    color = rgba(0, 0, 0, 0.0) # no fill
    rounding = -1 # circle
    border_size = 4
    border_color = rgba(0, 0, 0, 0)
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 20%, 5%
    dots_size = 0.2
    dots_spacing = 0.3
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(0, 0, 0, 0)
    #outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(208, 208, 208)
    font_family = $font
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d" # update every 60 seconds
    font_size = 30
    font_family = $font

    position = 0, -80
    halign = center
    valign = top
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 100
    font_family = $font

    position = 0, -150
    halign = center
    valign = top
}

label {
    monitor =
    text = <i>Hi, $USER</i>
    color = rgba(224, 224, 224, 1.0)
    font_size = 30
    ffont_family = $font

    position = 0, 80
    halign = center
    valign = center
}

