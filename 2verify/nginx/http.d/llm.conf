server{
    # Nginx version 1.25+
    listen 443 ssl; 
    http2 on;
    server_name llm.eg; ## domain name

    location / {
    	    proxy_pass 	          http://127.0.0.1:8080; 
	    proxy_set_header      Host $host;
        proxy_set_header      Upgrade $http_upgrade;
       	proxy_set_header      Connection "Upgrade";
    }
}

