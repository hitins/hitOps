# main config
server{
	# Nginx version 1.25+
	listen 443 ssl; 
    http2 on;
	server_name www.eg;
	location / {
		root $PATH;
		index index.html;
	}
	#error_page 404 /404.html;
	#location = /50x.html {
	#	root /usr/share/nginx/html;
	#}
}

# http to https
server{
	listen 80;
	server_name *.eg;
	return 301 https://$http_host$request_uri;
}
